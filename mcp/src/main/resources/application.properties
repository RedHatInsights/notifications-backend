quarkus.http.port=9010

quarkus.log.cloudwatch.enabled=false
quarkus.log.cloudwatch.level=INFO
quarkus.log.cloudwatch.log-stream-name=${HOST_NAME:notifications-mcp}
quarkus.log.cloudwatch.access-key-id=REPLACE_ME
quarkus.log.cloudwatch.access-key-secret=REPLACE_ME

# Sentry logging. Off by default, enabled on OpenShift
# See https://quarkus.io/guides/logging-sentry#in-app-packages
quarkus.log.sentry.enabled=false
quarkus.log.sentry.in-app-packages=*
quarkus.log.sentry.dsn=REPLACE_ME

quarkus.http.access-log.enabled=true
quarkus.http.access-log.category=access_log
quarkus.http.access-log.pattern=combined

quarkus.log.category."com.redhat.cloud.notifications".level=INFO
%test.quarkus.log.category."com.redhat.cloud.notifications".level=DEBUG

# Backend REST client
quarkus.rest-client.notifications-backend.url=${clowder.endpoints.notifications-backend-service.url:http://localhost:8085}
quarkus.rest-client.notifications-backend.connect-timeout=2000
quarkus.rest-client.notifications-backend.read-timeout=2000

# MCP Server - Streamable HTTP transport
# The MCP endpoint is available at /mcp by default.
# Enable stateless mode: each request gets its own ephemeral session,
# no session affinity needed behind a load balancer.
# See https://github.com/quarkiverse/quarkus-mcp-server/issues/555
quarkus.mcp.server.http.streamable.dummy-init=true

# MCP traffic logging (disabled by default, enable for debugging)
quarkus.mcp.server.traffic-logging.enabled=false
%dev.quarkus.mcp.server.traffic-logging.enabled=true
