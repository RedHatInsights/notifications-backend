# Test configuration for InMemory reactive messaging connectors
# Replace Kafka with InMemory connectors for testing
mp.messaging.incoming.incomingmessages.connector=smallrye-in-memory
mp.messaging.outgoing.outgoingmessages.connector=smallrye-in-memory

# Trust WireMock's self-signed certificate for HTTPS integration tests
quarkus.tls.wiremock-tls.trust-all=true
quarkus.tls.wiremock-tls.hostname-verification-algorithm=NONE
quarkus.rest-client.connector-rest-client.tls-configuration-name=wiremock-tls
