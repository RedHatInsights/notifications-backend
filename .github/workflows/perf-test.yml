---
# ─────────────────────────────────────────────────────────────────────────────
# ONBOARDING A NEW SERVICE?
#
# This file is service-specific. Each application that wants PR perf testing
# needs its own copy of this workflow with the following values updated:
#
#   1. IMAGE_URL (line ~19):
#        Change the Quay path to point at the new service's Konflux image.
#        Format: quay.io/redhat-user-workloads/<tenant>/<component>/<image>:on-pr-<sha>
#        Find the correct path via:
#          skopeo list-tags --no-creds docker://quay.io/redhat-user-workloads/<tenant>/<component>/<image>
#
#   2. jenkins_job (line ~49):
#        Change "InsightsNotifications_PRTest_builder" to the Jenkins job name
#        for your service (e.g. "InsightsKesselAPI_PRTest_builder").
#        Each service needs its own Job DSL entry in ci-configs/src/jobs/ and
#        a config file in ci-configs/jenkins/gh-pr-testing/.
#
#   3. Monitor URL (last line):
#        Update the Jenkins job URL to match the new jenkins_job name.
#
# See ci-configs/jenkins/gh-pr-testing/README.md for the full onboarding guide.
# ─────────────────────────────────────────────────────────────────────────────
name: Performance Regression Test

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'docs/**'

jobs:
  trigger-perf-test:
    name: Trigger Jenkins Performance Test
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image to test
        id: image
        run: |
          # Wait for Konflux to build and push the PR image to Quay.
          # Konflux publishes images as: quay.io/redhat-user-workloads/<org>/<component>:<tag>
          # Tag format for PRs: on-pr-<full-commit-sha>
          # TODO(onboarding): update this path when copying to a new service repo.
          IMAGE_URL="quay.io/redhat-user-workloads/hcc-integrations-tenant/notifications/notifications-backend:on-pr-${{ github.event.pull_request.head.sha }}"
          echo "Waiting for Konflux image: $IMAGE_URL"

          MAX_WAIT=1800
          INTERVAL=30
          elapsed=0
          while [ $elapsed -lt $MAX_WAIT ]; do
            if skopeo inspect --no-creds "docker://$IMAGE_URL" >/dev/null 2>&1; then
              echo "Image ready after ${elapsed}s: $IMAGE_URL"
              break
            fi
            echo "Not available yet — ${elapsed}s elapsed (max ${MAX_WAIT}s), retrying in ${INTERVAL}s..."
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

          if [ $elapsed -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out after ${MAX_WAIT}s waiting for Konflux image"
            exit 1
          fi

          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

      - name: Build and sign webhook payload
        id: payload
        env:
          WEBHOOK_SECRET: ${{ secrets.GOSMEE_WEBHOOK_SECRET }}
        run: |
          # Single-line JSON avoids multiline $GITHUB_OUTPUT issues.
          # jenkins_job routes to the correct Jenkins pipeline for this service.
          # image_tag_override carries the full Konflux image URL for deployment.
          # TODO(onboarding): update jenkins_job when copying to a new service repo.
          PAYLOAD=$(printf '{"jenkins_job":"InsightsNotifications_PRTest_builder","repo":"%s","pr_number":"%s","pr_sha":"%s","pr_branch":"%s","triggered_by":"%s","image_tag_override":"%s"}' \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.head_ref }}" \
            "${{ github.actor }}" \
            "${{ steps.image.outputs.image_url }}")
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | cut -d' ' -f2)
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Send webhook to gosmee
        run: |
          echo "Triggering perf test for PR #${{ github.event.pull_request.number }}"
          echo "Repo:      ${{ github.repository }}"
          echo "Branch:    ${{ github.head_ref }}"
          echo "SHA:       ${{ github.event.pull_request.head.sha }}"
          echo "Image tag: on-pr-${{ github.event.pull_request.head.sha }}"

          HTTP_STATUS=$(curl -s -o /tmp/gosmee_response.json -w "%{http_code}" \
            -X POST \
            "https://gosmee-server-smee-proxy.apps.rhperfcluster.ptjz.p1.openshiftapps.com/JIrfcIXXVTBJ" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${{ steps.payload.outputs.signature }}" \
            -d '${{ steps.payload.outputs.payload }}')

          echo "Gosmee response (HTTP $HTTP_STATUS):"
          cat /tmp/gosmee_response.json

          if [[ "$HTTP_STATUS" != "202" ]]; then
            echo "ERROR: Expected HTTP 202 from gosmee, got $HTTP_STATUS"
            exit 1
          fi

          echo "Webhook accepted. Jenkins job will start shortly."
          # TODO(onboarding): update this URL when copying to a new service repo.
          echo "Monitor at: https://jenkins-csb-perf-master.dno.corp.redhat.com/job/InsightsNotifications_PRTest_builder/"
