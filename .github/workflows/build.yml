name: Build & Test

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Prepare cache key
        id: cache-key
        shell: bash
        run: echo "::set-output name=date::$(/bin/date -u "+%Y-%m")"
      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          # The cache key is changed every month to prevent unlimited growth.
          key: maven-cache-${{ steps.cache-key.outputs.date }}
      - name: Cache Yarn dependencies
        uses: actions/cache@v6
        with:
          path: admin-console/src/main/webapp/.yarn/cache
          # The cache key is changed every month to prevent unlimited growth.
          key: yarn-cache-${{ steps.cache-key.outputs.date }}
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21
      - name: Verify if admin-console changed
        id: admin-console-changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: admin-console/**
      - name: Configure GPG signing
        # Needed before "Regenerate yarn.lock for Mintmaker branches" (so that
        # commit is signed too), not just before "Create PR for admin-console
        # updates" further down.
        if: steps.admin-console-changed.outputs.any_changed == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref_name, 'konflux/mintmaker/'))
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GIT_BOT_EMAIL: ${{ secrets.GIT_BOT_EMAIL }}
          GIT_BOT_NAME: ${{ secrets.GIT_BOT_NAME }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is not configured."
            echo "Add a GPG private key (ASCII-armored) as a repository secret named GPG_PRIVATE_KEY."
            echo "Generate one with: gpg --full-generate-key && gpg --export-secret-key -a <KEY_ID>"
            exit 1
          fi
          if [ -z "${GIT_BOT_EMAIL}" ] || [ -z "${GIT_BOT_NAME}" ]; then
            echo "Error: GIT_BOT_EMAIL and GIT_BOT_NAME secrets must be configured."
            echo "They must match a verified email/username on the GitHub account owning the GPG key."
            exit 1
          fi
          if [ -n "${GPG_PASSPHRASE}" ]; then
            if ! printenv GPG_PRIVATE_KEY | gpg --batch --pinentry-mode loopback --passphrase-fd 3 --import 3<<< "${GPG_PASSPHRASE}"; then
              echo "Error: Failed to import GPG key with passphrase. Check that GPG_PASSPHRASE is correct."
              exit 1
            fi
          else
            if ! printenv GPG_PRIVATE_KEY | gpg --batch --import; then
              echo "Error: Failed to import GPG key. Check that GPG_PRIVATE_KEY is valid ASCII-armored format."
              exit 1
            fi
          fi
          KEY_FINGERPRINT=$(gpg --list-secret-keys --with-colons --fingerprint 2>/dev/null | awk -F: '/^fpr/{print $10; exit}')
          if [ -z "${KEY_FINGERPRINT}" ]; then
            echo "Error: No GPG secret key found after import"
            exit 1
          fi
          echo "GPG_KEY_FINGERPRINT=${KEY_FINGERPRINT}" >> "${GITHUB_ENV}"
          git config user.signingkey "${KEY_FINGERPRINT}"
          git config commit.gpgsign true
          git config user.email "${GIT_BOT_EMAIL}"
          git config user.name "${GIT_BOT_NAME}"
          if [ -n "${GPG_PASSPHRASE}" ]; then
            echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
            gpg-connect-agent reloadagent /bye
            KEYGRIP=$(gpg --list-secret-keys --with-keygrip --with-colons 2>/dev/null | awk -F: '/^grp/{print $10; exit}')
            if [ -z "${KEYGRIP}" ]; then
              echo "Error: Could not extract GPG keygrip for passphrase preset"
              exit 1
            fi
            if ! /usr/lib/gnupg/gpg-preset-passphrase --preset "${KEYGRIP}" <<< "${GPG_PASSPHRASE}"; then
              echo "Error: Failed to preset GPG passphrase"
              exit 1
            fi
          fi
      - name: Set up Node for Mintmaker lockfile refresh
        # Keep this version in sync with <nodeVersion> in admin-console/pom.xml.
        if: steps.admin-console-changed.outputs.any_changed == 'true' && github.event_name == 'push' && startsWith(github.ref_name, 'konflux/mintmaker/')
        uses: actions/setup-node@v5
        with:
          node-version: 22.20.0
      - name: Regenerate yarn.lock for Mintmaker branches
        # Mintmaker bumps package.json dependency ranges but never runs yarn
        # install, so yarn.lock goes stale and the immutable install in
        # "Build admin-console" fails. Refresh and push the lockfile here so
        # the branch is self-consistent before the real build runs. Relies on
        # the git identity and signing key set up by "Configure GPG signing"
        # so the pushed commit shows as Verified.
        if: steps.admin-console-changed.outputs.any_changed == 'true' && github.event_name == 'push' && startsWith(github.ref_name, 'konflux/mintmaker/')
        working-directory: admin-console/src/main/webapp
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
          BRANCH_REF: ${{ github.ref_name }}
        run: |
          corepack enable
          yarn install
          if git diff --quiet -- yarn.lock; then
            echo "yarn.lock is already up to date"
            exit 0
          fi
          git add yarn.lock
          git commit -S -m "Regenerate yarn.lock to match Mintmaker's dependency bump"
          git push origin "HEAD:${BRANCH_REF}"
      - name: Build admin-console
        if: steps.admin-console-changed.outputs.any_changed == 'true'
        run: ./mvnw clean verify -Padmin-console -pl :checkstyle,:notifications-admin-console --no-transfer-progress
      - name: Create PR for admin-console updates
        if: steps.admin-console-changed.outputs.any_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/push-admin-console.sh
      - name: Cleanup GPG key
        if: always() && steps.admin-console-changed.outputs.any_changed == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref_name, 'konflux/mintmaker/'))
        run: |
          if [ -n "${GPG_KEY_FINGERPRINT}" ]; then
            gpg --batch --yes --delete-secret-and-public-key "${GPG_KEY_FINGERPRINT}" || true
          fi
          gpgconf --kill gpg-agent || true
          rm -rf ~/.gnupg
          git config --unset user.signingkey || true
          git config --unset commit.gpgsign || true
      - name: Build with Maven
        run: ./mvnw clean verify --no-transfer-progress
      - name: Pushes coverage
        run: bash <(curl -s https://codecov.io/bash)
      - uses: actions/upload-artifact@v7
        name: Upload openapi.json
        with:
          name: openapi
          path: |
            backend/target/api/notifications/v1/openapi.json
            backend/target/api/notifications/v2/openapi.json
            backend/target/api/integrations/v1/openapi.json
            backend/target/api/integrations/v2/openapi.json
            backend/target/api/private/v1/openapi.json
            backend/target/api/private/v2/openapi.json
            backend/target/internal/openapi.json
